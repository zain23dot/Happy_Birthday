<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Birthday Surprise</title>
<link rel="stylesheet" href="style.css">
</head><body>
<section id="page1" class="page active">
<h1>A surprise is waiting... 💖</h1>
<input id="pass" type="password" maxlength="4" placeholder="Enter Passcode">
<button onclick="unlock()">Unlock ❤️</button>
<p id="err"></p>
</section>

<section id="page2" class="page">
<h1>🎂 Happy Birthday <span id="herName">HER NAME</span> ❤️</h1>
<p id="type"></p>
<button onclick="nextPage(3)">Continue ➜</button>
</section>

<section id="page3" class="page">
<h1>For You 💌</h1>
<div class="grid">
<div class="card">💖<br>Sweet Wish 1</div>
<div class="card">🌸<br>Sweet Wish 2</div>
<div class="card">🦋<br>Sweet Wish 3</div>
<div class="card">✨<br>Sweet Wish 4</div>
</div>
<button onclick="nextPage(4)">Next ➜</button>
</section>

<section id="page4" class="page">
<h1>Our Memories 📸</h1>
<img id="slider" src="assets/images/photo1.jpg">
<h2>Forever starts with you ❤️</h2>
<button onclick="nextPage(5)">One Last Surprise 🎁</button>
</section>

<section id="page5" class="page">
<div id="gift">🎁</div>
<h1>Tap the Gift</h1>
<div id="final" style="display:none">
<h2>I Love You ❤️</h2>
<p>Replace this with your final heartfelt letter.</p>
</div>
<audio id="music" controls loop>
<source src="assets/music/song.mp3" type="audio/mpeg">
</audio>
</section>
<script src="script.js"></script>
</body></html>
